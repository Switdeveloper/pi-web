<!DOCTYPE html>
<html lang="en">
<head>
	<meta charset="UTF-8">
	<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
	<title>Pi AI Agent - NVIDIA AI</title>
	<style>
		:root {
			--bg-primary: #09090b;
			--bg-secondary: #18181b;
			--bg-tertiary: #27272a;
			--border: #3f3f46;
			--text-primary: #fafafa;
			--text-secondary: #a1a1aa;
			--text-muted: #71717a;
			--accent: #3b82f6;
			--accent-hover: #2563eb;
			--success: #22c55e;
			--error: #ef4444;
			--radius: 0.75rem;
		}

		* {
			margin: 0;
			padding: 0;
			box-sizing: border-box;
		}

		html, body {
			height: 100%;
			font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
			background: var(--bg-primary);
			color: var(--text-primary);
			line-height: 1.5;
		}

		.app {
			display: flex;
			flex-direction: column;
			height: 100%;
			max-width: 100%;
			overflow: hidden;
		}

		.header {
			display: flex;
			align-items: center;
			justify-content: space-between;
			padding: 0.75rem 1rem;
			background: var(--bg-secondary);
			border-bottom: 1px solid var(--border);
			flex-shrink: 0;
		}

		.header-left {
			display: flex;
			align-items: center;
			gap: 0.75rem;
		}

		.logo {
			font-size: 1.25rem;
			font-weight: 700;
			background: linear-gradient(135deg, var(--accent), #8b5cf6);
			-webkit-background-clip: text;
			-webkit-text-fill-color: transparent;
		}

		.model-badge {
			font-size: 0.7rem;
			padding: 0.2rem 0.5rem;
			background: var(--bg-tertiary);
			border-radius: 9999px;
			color: var(--text-secondary);
			cursor: pointer;
			transition: background 0.15s;
		}

		.model-badge:hover {
			background: var(--border);
		}

		.header-actions {
			display: flex;
			gap: 0.5rem;
		}

		.icon-btn {
			width: 2.25rem;
			height: 2.25rem;
			display: flex;
			align-items: center;
			justify-content: center;
			background: transparent;
			border: 1px solid var(--border);
			border-radius: 0.5rem;
			color: var(--text-secondary);
			cursor: pointer;
			transition: all 0.15s;
		}

		.icon-btn:hover {
			background: var(--bg-tertiary);
			color: var(--text-primary);
		}

		.messages {
			flex: 1;
			overflow-y: auto;
			padding: 1rem;
			display: flex;
			flex-direction: column;
			gap: 1rem;
		}

		.message {
			display: flex;
			gap: 0.75rem;
			max-width: 100%;
		}

		.message.user {
			flex-direction: row-reverse;
		}

		.message-avatar {
			width: 2rem;
			height: 2rem;
			border-radius: 0.5rem;
			background: var(--bg-tertiary);
			display: flex;
			align-items: center;
			justify-content: center;
			flex-shrink: 0;
			font-size: 0.875rem;
		}

		.message.user .message-avatar {
			background: var(--accent);
		}

		.message-content {
			flex: 1;
			min-width: 0;
		}

		.message-text {
			padding: 0.75rem 1rem;
			background: var(--bg-secondary);
			border-radius: var(--radius);
			border: 1px solid var(--border);
			font-size: 0.9rem;
			white-space: pre-wrap;
			word-break: break-word;
		}

		.message.user .message-text {
			background: var(--accent);
			border-color: var(--accent);
		}

		.input-area {
			padding: 0.75rem 1rem;
			background: var(--bg-secondary);
			border-top: 1px solid var(--border);
			flex-shrink: 0;
		}

		.input-container {
			display: flex;
			gap: 0.5rem;
			align-items: flex-end;
		}

		textarea {
			flex: 1;
			min-height: 2.5rem;
			max-height: 10rem;
			padding: 0.625rem 0.875rem;
			background: var(--bg-primary);
			border: 1px solid var(--border);
			border-radius: var(--radius);
			color: var(--text-primary);
			font-size: 0.9rem;
			font-family: inherit;
			resize: none;
			outline: none;
			transition: border-color 0.15s;
		}

		textarea:focus {
			border-color: var(--accent);
		}

		textarea::placeholder {
			color: var(--text-muted);
		}

		.send-btn {
			width: 2.5rem;
			height: 2.5rem;
			display: flex;
			align-items: center;
			justify-content: center;
			background: var(--accent);
			border: none;
			border-radius: var(--radius);
			color: white;
			cursor: pointer;
			transition: background 0.15s;
			flex-shrink: 0;
		}

		.send-btn:hover:not(:disabled) {
			background: var(--accent-hover);
		}

		.send-btn:disabled {
			opacity: 0.5;
			cursor: not-allowed;
		}

		.settings-overlay {
			position: fixed;
			inset: 0;
			background: rgba(0, 0, 0, 0.5);
			display: none;
			z-index: 50;
		}

		.settings-overlay.show {
			display: block;
		}

		.settings-panel {
			position: fixed;
			right: 0;
			top: 0;
			bottom: 0;
			width: 100%;
			max-width: 400px;
			background: var(--bg-secondary);
			border-left: 1px solid var(--border);
			transform: translateX(100%);
			transition: transform 0.3s ease;
			display: flex;
			flex-direction: column;
			z-index: 51;
		}

		.settings-panel.show {
			transform: translateX(0);
		}

		.settings-header {
			display: flex;
			align-items: center;
			justify-content: space-between;
			padding: 1rem;
			border-bottom: 1px solid var(--border);
		}

		.settings-header h2 {
			font-size: 1rem;
			font-weight: 600;
		}

		.settings-content {
			flex: 1;
			overflow-y: auto;
			padding: 1rem;
		}

		.setting-group {
			margin-bottom: 1.5rem;
		}

		.setting-group h3 {
			font-size: 0.8rem;
			font-weight: 600;
			color: var(--text-muted);
			text-transform: uppercase;
			letter-spacing: 0.05em;
			margin-bottom: 0.75rem;
		}

		.setting-row {
			display: flex;
			flex-direction: column;
			gap: 0.5rem;
			padding: 0.75rem;
			background: var(--bg-primary);
			border-radius: 0.5rem;
			margin-bottom: 0.5rem;
		}

		.setting-row label {
			font-size: 0.8rem;
			color: var(--text-secondary);
		}

		.setting-row input,
		.setting-row select {
			padding: 0.625rem 0.75rem;
			background: var(--bg-tertiary);
			border: 1px solid var(--border);
			border-radius: 0.375rem;
			color: var(--text-primary);
			font-size: 0.875rem;
			outline: none;
			width: 100%;
		}

		.setting-row input:focus,
		.setting-row select:focus {
			border-color: var(--accent);
		}

		.save-btn {
			width: 100%;
			padding: 0.75rem;
			background: var(--accent);
			border: none;
			border-radius: 0.5rem;
			color: white;
			font-size: 0.9rem;
			font-weight: 600;
			cursor: pointer;
			transition: background 0.15s;
		}

		.save-btn:hover {
			background: var(--accent-hover);
		}

		.loading {
			display: flex;
			align-items: center;
			justify-content: center;
			gap: 0.5rem;
			color: var(--text-muted);
			font-size: 0.875rem;
			padding: 1rem;
		}

		.spinner {
			width: 1rem;
			height: 1rem;
			border: 2px solid var(--border);
			border-top-color: var(--accent);
			border-radius: 50%;
			animation: spin 0.8s linear infinite;
		}

		@keyframes spin {
			to { transform: rotate(360deg); }
		}

		.welcome {
			text-align: center;
			padding: 3rem 1rem;
			color: var(--text-muted);
		}

		.welcome h2 {
			font-size: 1.25rem;
			color: var(--text-primary);
			margin-bottom: 0.5rem;
		}

		.welcome p {
			font-size: 0.875rem;
			max-width: 300px;
			margin: 0 auto 1.5rem;
		}

		.quick-models {
			display: flex;
			flex-wrap: wrap;
			gap: 0.5rem;
			justify-content: center;
		}

		.quick-model-btn {
			padding: 0.5rem 1rem;
			background: var(--bg-tertiary);
			border: 1px solid var(--border);
			border-radius: 0.5rem;
			color: var(--text-secondary);
			font-size: 0.8rem;
			cursor: pointer;
			transition: all 0.15s;
		}

		.quick-model-btn:hover,
		.quick-model-btn.active {
			background: var(--accent);
			border-color: var(--accent);
			color: white;
		}

		.toast {
			position: fixed;
			bottom: 5rem;
			left: 50%;
			transform: translateX(-50%) translateY(100px);
			background: var(--bg-secondary);
			border: 1px solid var(--border);
			padding: 0.75rem 1.25rem;
			border-radius: 0.5rem;
			font-size: 0.875rem;
			opacity: 0;
			transition: all 0.3s ease;
			z-index: 100;
		}

		.toast.show {
			transform: translateX(-50%) translateY(0);
			opacity: 1;
		}

		.toast.success {
			border-color: var(--success);
			color: var(--success);
		}

		.toast.error {
			border-color: var(--error);
			color: var(--error);
		}
	</style>
</head>
<body>
	<div class="app">
		<header class="header">
			<div class="header-left">
				<span class="logo">Pi</span>
				<span class="model-badge" id="currentModel" title="Click to change model">moonshotai/kimi-k2.6</span>
			</div>
			<div class="header-actions">
				<button class="icon-btn" id="clearBtn" title="New Chat">
					<svg width="16" height="16" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
						<path d="M12 5v14M5 12h14"/>
					</svg>
				</button>
				<button class="icon-btn" id="settingsBtn" title="Settings">
					<svg width="16" height="16" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
						<circle cx="12" cy="12" r="3"/>
						<path d="M12 1v2m0 18v2M4.22 4.22l1.42 1.42m12.72 12.72l1.42 1.42M1 12h2m18 0h2M4.22 19.78l1.42-1.42M18.36 5.64l1.42-1.42"/>
					</svg>
				</button>
			</div>
		</header>

		<div class="messages" id="messages">
			<div class="welcome">
				<h2>Welcome to Pi AI</h2>
				<p>Your AI coding assistant powered by NVIDIA with moonshotai/kimi-k2.6</p>
				<div class="quick-models">
					<button class="quick-model-btn active" data-model="moonshotai/kimi-k2.6">moonshotai/kimi-k2.6</button>
					<button class="quick-model-btn" data-model="nvidia/llama-3.1-nemotron-70b-instruct">NVIDIA Nemotron 70B</button>
					<button class="quick-model-btn" data-model="minimaxai/minimax-m2.7">Minimax M2.7</button>
					<button class="quick-model-btn" data-model="google/gemma-3-27b-it">Gemma 3 27B</button>
				</div>
			</div>
		</div>

		<div class="input-area">
			<div class="input-container">
				<textarea id="messageInput" placeholder="Ask me anything..." rows="1"></textarea>
				<button class="send-btn" id="sendBtn">
					<svg width="16" height="16" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
						<path d="M22 2L11 13M22 2l-7 20-4-9-9-4 20-7z"/>
					</svg>
				</button>
			</div>
		</div>
	</div>

	<div class="settings-overlay" id="settingsOverlay"></div>

	<div class="settings-panel" id="settingsPanel">
		<div class="settings-header">
			<h2>Settings</h2>
			<button class="icon-btn" id="closeSettings">
				<svg width="16" height="16" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
					<path d="M18 6L6 18M6 6l12 12"/>
				</svg>
			</button>
		</div>
		<div class="settings-content">
			<div class="setting-group">
				<h3>Model Configuration</h3>
				<div class="setting-row">
					<label>Model ID</label>
					<input type="text" id="modelInput" value="moonshotai/kimi-k2.6">
				</div>
			</div>

			<div class="setting-group">
				<h3>API Configuration</h3>
				<div class="setting-row">
					<label>API Key</label>
					<input type="password" id="apiKeyInput" value="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">
				</div>
				<div class="setting-row">
					<label>Base URL</label>
					<input type="text" id="baseUrlInput" value="https://integrate.api.nvidia.com/v1">
				</div>
			</div>

			<button class="save-btn" id="saveBtn">Save Settings</button>
		</div>
	</div>

	<div class="toast" id="toast"></div>

	<script>
		const API_KEY = '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';
		const BASE_URL = 'https://integrate.api.nvidia.com/v1';

		let currentConfig = {
			model: 'moonshotai/kimi-k2.6',
			apiKey: API_KEY,
			baseUrl: BASE_URL
		};

		const messagesEl = document.getElementById('messages');
		const messageInput = document.getElementById('messageInput');
		const sendBtn = document.getElementById('sendBtn');
		const settingsBtn = document.getElementById('settingsBtn');
		const closeSettings = document.getElementById('closeSettings');
		const settingsOverlay = document.getElementById('settingsOverlay');
		const settingsPanel = document.getElementById('settingsPanel');
		const modelInput = document.getElementById('modelInput');
		const apiKeyInput = document.getElementById('apiKeyInput');
		const baseUrlInput = document.getElementById('baseUrlInput');
		const currentModelEl = document.getElementById('currentModel');
		const clearBtn = document.getElementById('clearBtn');
		const saveBtn = document.getElementById('saveBtn');
		const toast = document.getElementById('toast');
		const quickModelBtns = document.querySelectorAll('.quick-model-btn');

		function showToast(message, type = '') {
			toast.textContent = message;
			toast.className = 'toast show ' + type;
			setTimeout(() => toast.className = 'toast', 3000);
		}

		function updateUI() {
			currentModelEl.textContent = currentConfig.model;
			document.querySelectorAll('.quick-model-btn').forEach(btn => {
				btn.classList.toggle('active', btn.dataset.model === currentConfig.model);
			});
		}

		function addMessage(role, content) {
			const messageEl = document.createElement('div');
			messageEl.className = `message ${role}`;
			messageEl.innerHTML = `
				<div class="message-avatar">${role === 'user' ? '👤' : '🤖'}</div>
				<div class="message-content">
					<div class="message-text">${escapeHtml(content)}</div>
				</div>
			`;
			messagesEl.appendChild(messageEl);
			messagesEl.scrollTop = messagesEl.scrollHeight;
		}

		function addLoadingMessage() {
			const messageEl = document.createElement('div');
			messageEl.className = 'message assistant';
			messageEl.id = 'loadingMessage';
			messageEl.innerHTML = `
				<div class="message-avatar">🤖</div>
				<div class="message-content">
					<div class="message-text"><div class="loading"><span class="spinner"></span>Thinking...</div></div>
				</div>
			`;
			messagesEl.appendChild(messageEl);
			messagesEl.scrollTop = messagesEl.scrollHeight;
		}

		function removeLoadingMessage() {
			const loading = document.getElementById('loadingMessage');
			if (loading) loading.remove();
		}

		function escapeHtml(text) {
			const div = document.createElement('div');
			div.textContent = text;
			return div.innerHTML;
		}

		async function sendMessage() {
			const content = messageInput.value.trim();
			if (!content) return;

			messageInput.value = '';
			messageInput.style.height = 'auto';
			addMessage('user', content);
			addLoadingMessage();

			try {
				const response = await fetch(`${currentConfig.baseUrl}/chat/completions`, {
					method: 'POST',
					headers: {
						'Content-Type': 'application/json',
						'Authorization': `Bearer ${currentConfig.apiKey}`
					},
					body: JSON.stringify({
						model: currentConfig.model,
						messages: [{ role: 'user', content }],
						max_tokens: 4096,
						temperature: 0.7
					})
				});

				if (!response.ok) {
					const error = await response.text();
					throw new Error(`API error ${response.status}: ${error}`);
				}

				const data = await response.json();
				const assistantContent = data.choices[0].message.content;

				removeLoadingMessage();
				addMessage('assistant', assistantContent);
			} catch (error) {
				removeLoadingMessage();
				showToast(error.message, 'error');
				console.error('API Error:', error);
			}
		}

		function openSettings() {
			settingsOverlay.classList.add('show');
			settingsPanel.classList.add('show');
			modelInput.value = currentConfig.model;
			apiKeyInput.value = currentConfig.apiKey;
			baseUrlInput.value = currentConfig.baseUrl;
		}

		function closeSettingsPanel() {
			settingsOverlay.classList.remove('show');
			settingsPanel.classList.remove('show');
		}

		function saveSettings() {
			currentConfig.model = modelInput.value.trim();
			currentConfig.apiKey = apiKeyInput.value.trim();
			currentConfig.baseUrl = baseUrlInput.value.trim();
			localStorage.setItem('pi-config', JSON.stringify(currentConfig));
			updateUI();
			closeSettingsPanel();
			showToast('Settings saved', 'success');
		}

		function clearChat() {
			messagesEl.innerHTML = `
				<div class="welcome">
					<h2>Welcome to Pi AI</h2>
					<p>Your AI coding assistant powered by NVIDIA with moonshotai/kimi-k2.6</p>
					<div class="quick-models">
						<button class="quick-model-btn ${currentConfig.model === 'moonshotai/kimi-k2.6' ? 'active' : ''}" data-model="moonshotai/kimi-k2.6">moonshotai/kimi-k2.6</button>
						<button class="quick-model-btn ${currentConfig.model === 'nvidia/llama-3.1-nemotron-70b-instruct' ? 'active' : ''}" data-model="nvidia/llama-3.1-nemotron-70b-instruct">NVIDIA Nemotron 70B</button>
						<button class="quick-model-btn ${currentConfig.model === 'minimaxai/minimax-m2.7' ? 'active' : ''}" data-model="minimaxai/minimax-m2.7">Minimax M2.7</button>
						<button class="quick-model-btn ${currentConfig.model === 'google/gemma-3-27b-it' ? 'active' : ''}" data-model="google/gemma-3-27b-it">Gemma 3 27B</button>
					</div>
				</div>
			`;
			bindQuickModelButtons();
		}

		function bindQuickModelButtons() {
			document.querySelectorAll('.quick-model-btn').forEach(btn => {
				btn.addEventListener('click', () => {
					currentConfig.model = btn.dataset.model;
					localStorage.setItem('pi-config', JSON.stringify(currentConfig));
					updateUI();
					clearChat();
					showToast(`Model changed to ${currentConfig.model}`, 'success');
				});
			});
		}

		messageInput.addEventListener('input', () => {
			messageInput.style.height = 'auto';
			messageInput.style.height = Math.min(messageInput.scrollHeight, 160) + 'px';
		});

		messageInput.addEventListener('keydown', (e) => {
			if (e.key === 'Enter' && !e.shiftKey) {
				e.preventDefault();
				sendMessage();
			}
		});

		sendBtn.addEventListener('click', sendMessage);
		settingsBtn.addEventListener('click', openSettings);
		closeSettings.addEventListener('click', closeSettingsPanel);
		settingsOverlay.addEventListener('click', closeSettingsPanel);
		saveBtn.addEventListener('click', saveSettings);
		clearBtn.addEventListener('click', clearChat);

		const saved = localStorage.getItem('pi-config');
		if (saved) {
			try {
				currentConfig = { ...currentConfig, ...JSON.parse(saved) };
			} catch (e) {}
		}

		updateUI();
		bindQuickModelButtons();
	</script>
</body>
</html>
